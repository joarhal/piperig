version: 2

builds:
  - main: ./cmd/piperig
    binary: piperig
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz

changelog:
  use: github
  filters:
    exclude:
      - "^docs"
      - "^chore"
      - "^test"
