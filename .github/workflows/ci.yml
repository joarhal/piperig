name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.0-rc.1"

      - name: Generate
        run: go generate ./...

      - name: Check generated files are up to date
        run: git diff --exit-code || (echo "::error::go generate produced changes — run 'go generate ./...' and commit" && exit 1)

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...
